version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: plantcor-prometheus
    restart: unless-stopped
    ports:
      - "9093:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - plantcor-monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: plantcor-grafana
    restart: unless-stopped
    ports:
      - "9091:3000" # Exposed on port 9091 to avoid colliding with Next.js (3000) or Flowise (3001)
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin} # Default admin password
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - plantcor-monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: plantcor-cadvisor
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - plantcor-monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  plantcor-monitoring:
    driver: bridge
