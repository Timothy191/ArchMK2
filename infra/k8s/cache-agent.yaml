apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-agent
  labels:
    app: cache-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cache-agent
  template:
    metadata:
      labels:
        app: cache-agent
    spec:
      containers:
      - name: cache-agent
        image: amca-cache-agent:latest
        ports:
        - containerPort: 3008
        env:
        - name: REDIS_URLS
          value: "redis://redis-cluster:6379"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
