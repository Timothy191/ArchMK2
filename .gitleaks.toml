# Gitleaks configuration for Arch-Mk2
# https://github.com/gitleaks/gitleaks

title = "Arch-Mk2 Secret Scanner"

# Global allowlists
[allowlist]
  description = "Global allowlist for false positives"
  paths = [
    '''node_modules''',
    '''\.next''',
    '''dist''',
    '''build''',
    '''coverage''',
    '''.nx/cache''',
    '''.nx/workspace-data''',
    '''\.turbo''',
    '''pnpm-lock\.yaml''',
    '''wiki/logs/.*''',
  ]

# Custom rules for Arch-Mk2 specific patterns
[[rules]]
  id = "arch-mk2-supabase-service-key"
  description = "Supabase service role key (full access; never commit)"
  regex = '''SUPABASE_SERVICE_KEY\s*=\s*["'](eyJ[A-Za-z0-9_-]{20,}\.eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,})["']'''
  tags = ["secret", "supabase", "critical"]

  [rules.allowlist]
    paths = ['''\.env\.example''', '''\.github/workflows/ci\.yml''']

[[rules]]
  id = "arch-mk2-sentry-dsn"
  description = "Sentry DSN with project key"
  regex = '''SENTRY_DSN\s*=\s*["'](https://[a-f0-9]+@[a-z0-9.]+\.sentry\.io/[0-9]+)["']'''
  tags = ["secret", "sentry"]

  [rules.allowlist]
    paths = ['''\.env\.example''']

[[rules]]
  id = "arch-mk2-payload-secret"
  description = "Payload CMS secret key"
  regex = '''PAYLOAD_SECRET\s*=\s*["']([a-zA-Z0-9]{32,})["']'''
  tags = ["secret", "payload"]

  [rules.allowlist]
    paths = ['''\.env\.example''', '''\.github/workflows/ci\.yml''']

[[rules]]
  id = "arch-mk2-anthropic-key"
  description = "Anthropic API key"
  regex = '''sk-ant-[A-Za-z0-9_-]{40,}'''
  tags = ["secret", "ai", "anthropic"]

[[rules]]
  id = "arch-mk2-openai-key"
  description = "OpenAI API key"
  regex = '''sk-[A-Za-z0-9]{20,}T3BlbkFJ[A-Za-z0-9]{20,}'''
  tags = ["secret", "ai", "openai"]

# Inherit default rules
[extend]
  useDefault = true
