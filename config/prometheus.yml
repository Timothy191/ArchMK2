global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "kiro-agent"
    static_configs:
      - targets: ["localhost:9464"]
    metrics_path: "/metrics"
    honor_labels: true

  - job_name: "n8n"
    static_configs:
      - targets: ["n8n:5678"]
    metrics_path: "/metrics"
    honor_labels: true

  - job_name: "langfuse"
    static_configs:
      - targets: ["langfuse:3000"]
    metrics_path: "/api/public/metrics"
    honor_labels: true

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
