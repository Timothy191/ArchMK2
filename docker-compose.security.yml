version: "3.8"

# docker-compose.security.yml
# OWASP ZAP security scan service.
# Usage (app must already be running on host):
#   docker compose -f docker-compose.security.yml run --rm zap-baseline
#   docker compose -f docker-compose.security.yml run --rm zap-full
#
# Or use the convenience script:
#   ./scripts/pentest.sh [target] [--full]

services:
  zap-baseline:
    image: ghcr.io/zaproxy/zaproxy:stable
    network_mode: host
    volumes:
      - ./test-results/pentest:/zap/wrk/:rw
    command: >
      zap-baseline.py
        -t http://localhost:3000
        -r zap-baseline-report.html
        -J zap-baseline-report.json
        -l WARN
        -I
    profiles:
      - security

  zap-full:
    image: ghcr.io/zaproxy/zaproxy:stable
    network_mode: host
    volumes:
      - ./test-results/pentest:/zap/wrk/:rw
    command: >
      zap-full-scan.py
        -t http://localhost:3000
        -r zap-full-report.html
        -J zap-full-report.json
        -I
    profiles:
      - security-full
