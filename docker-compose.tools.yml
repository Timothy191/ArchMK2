version: "3.8"

services:
  n8n:
    image: n8nio/n8n:1.45.0
    container_name: plantcor-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=plantcor
      - N8N_BASIC_AUTH_PASSWORD=plantcor
      - N8N_ENCRYPTION_KEY=plantcor-secret-key-change-in-production
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=16
      - N8N_LOG_LEVEL=warn
      - OTEL_SDK_DISABLED=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://langfuse:4318
      - OTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer sk-lf-plantcor
      - OTEL_SERVICE_NAME=n8n-agent
      - OTEL_LOG_USER_PROMPTS=1
      - OTEL_LOG_TOOL_DETAILS=1
    volumes:
      - /home/timothy/.n8n:/home/node/.n8n
    depends_on:
      langfuse:
        condition: service_healthy
    networks:
      - plantcor-tools

  flowise:
    image: flowiseai/flowise:2.1.2
    container_name: plantcor-flowise
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - FLOWISE_USERNAME=plantcor
      - FLOWISE_PASSWORD=plantcor
      - FLOWISE_SECRETKEY_OVERWRITE=plantcor-secret-key-change-in-production
    volumes:
      - flowise_data:/root/.flowise
    networks:
      - plantcor-tools

  redis:
    image: redis:7-alpine
    container_name: plantcor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - plantcor-tools

  langfuse:
    image: langfuse/langfuse:3
    container_name: plantcor-langfuse
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      - OTEL_EXPORTER_OTLP_ENABLED=true
      - LANGFUSE_INIT_ORG_ID=plantcor
      - LANGFUSE_INIT_ORG_NAME=PlantCor
      - LANGFUSE_INIT_PROJECT_ID=kiro-agent
      - LANGFUSE_INIT_PROJECT_NAME=Kiro Agent
      - LANGFUSE_INIT_USER_EMAIL=timothyoniel558@gmail.com
      - LANGFUSE_INIT_USER_NAME=Timothy
      - LANGFUSE_INIT_PUBLIC_KEY=pk-lf-plantcor
      - LANGFUSE_INIT_SECRET_KEY=sk-lf-plantcor
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-redis:
        condition: service_started
    networks:
      - plantcor-tools

  langfuse-db:
    image: postgres:16-alpine
    container_name: plantcor-langfuse-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - plantcor-tools

  langfuse-redis:
    image: redis:7-alpine
    container_name: plantcor-langfuse-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - plantcor-tools

  qdrant:
    image: qdrant/qdrant:latest
    container_name: plantcor-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - plantcor-tools

  prometheus:
    image: prom/prometheus:latest
    container_name: plantcor-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - plantcor-tools

volumes:
  flowise_data:
  redis_data:
  langfuse_db_data:
  qdrant_data:
  prometheus_data:

networks:
  plantcor-tools:
    driver: bridge
