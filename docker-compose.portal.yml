version: "3.8"

# Portal stack with load balancer for production deployments
# Usage: docker compose -f docker-compose.portal.yml up -d

services:
  nginx:
    image: nginx:alpine
    container_name: arch-portal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - portal
    networks:
      - plantcor-tools

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    container_name: arch-portal-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    env_file:
      - .env
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - plantcor-tools

volumes:
  certs:

networks:
  plantcor-tools:
    external: true